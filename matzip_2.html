<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 맛집</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0e0c;--surface:#1a1916;--border:#2e2c28;--accent:#e8b84b;--accent2:#c9643a;--text:#e8e4dc;--muted:#7a7568;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif KR',serif;min-height:100vh;}
header{padding:1.5rem 1.5rem 0.6rem;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:100;}
.header-top{display:flex;align-items:baseline;gap:0.8rem;margin-bottom:0.7rem;}
h1{font-size:1.3rem;font-weight:700;color:var(--accent);}
.count{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);}
.row{display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;margin-bottom:0.5rem;}
input[type="text"]{flex:1;min-width:150px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.48rem 0.75rem;font-family:'Noto Serif KR',serif;font-size:0.82rem;border-radius:6px;outline:none;}
input[type="text"]:focus{border-color:var(--accent);}
input::placeholder{color:var(--muted);}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:0.43rem 0.6rem;font-family:'Noto Serif KR',serif;font-size:0.77rem;border-radius:6px;outline:none;cursor:pointer;}
.btn-loc{background:var(--accent);color:#0f0e0c;border:none;padding:0.43rem 0.75rem;font-family:'Noto Serif KR',serif;font-size:0.77rem;font-weight:700;border-radius:6px;cursor:pointer;}
.btn-loc.active{background:var(--accent2);color:#fff;}
.cat-scroll{overflow-x:auto;margin-bottom:0.4rem;}
.cat-scroll::-webkit-scrollbar{height:3px;}
.cat-scroll::-webkit-scrollbar-thumb{background:var(--border);}
.cat-tabs{display:flex;gap:0.3rem;width:max-content;padding-bottom:2px;}
.cat-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:0.28rem 0.6rem;font-family:'DM Mono',monospace;font-size:0.67rem;border-radius:20px;cursor:pointer;white-space:nowrap;}
.cat-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(232,184,75,0.08);}
.sort-tabs{display:flex;gap:0.3rem;}
.sort-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:0.33rem 0.6rem;font-family:'DM Mono',monospace;font-size:0.67rem;border-radius:5px;cursor:pointer;}
.sort-btn.on{border-color:var(--accent);color:var(--accent);background:rgba(232,184,75,0.07);}
.loc-info{font-family:'DM Mono',monospace;font-size:0.67rem;color:var(--accent);padding:0.2rem 0 0;}
.item{display:flex;align-items:flex-start;gap:0.8rem;padding:0.85rem 1.5rem;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;transition:background 0.15s;}
.item:hover{background:var(--surface);}
.item-rank{font-family:'DM Mono',monospace;font-size:0.61rem;color:var(--muted);min-width:20px;padding-top:3px;}
.item-body{flex:1;min-width:0;}
.item-name{font-size:0.9rem;font-weight:600;margin-bottom:0.18rem;line-height:1.3;}
.item-meta{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.18rem;}
.rating{font-family:'DM Mono',monospace;font-size:0.71rem;color:var(--accent);font-weight:500;}
.reviews{font-family:'DM Mono',monospace;font-size:0.66rem;color:var(--muted);}
.cat-tag{font-size:0.63rem;color:var(--accent2);background:rgba(201,100,58,0.12);padding:0.1rem 0.42rem;border-radius:3px;}
.address{font-size:0.68rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.dist{font-family:'DM Mono',monospace;font-size:0.67rem;color:var(--accent2);font-weight:500;white-space:nowrap;padding-top:3px;}
.empty{text-align:center;color:var(--muted);padding:4rem 1rem;}
.banner{background:rgba(232,184,75,0.08);border-bottom:1px solid var(--border);padding:0.4rem 1.5rem;font-size:0.71rem;color:var(--accent);font-family:'DM Mono',monospace;display:none;}
.banner.show{display:block;}
</style>
</head>
<body>
<header>
  <div class="header-top"><h1>내 맛집</h1><span class="count" id="countEl">—개</span></div>
  <div class="row">
    <input type="text" id="search" placeholder="이름 검색...">
    <button class="btn-loc" id="locBtn" onclick="toggleLoc()">📍 내 위치</button>
    <select id="distF" onchange="render()">
      <option value="0">거리 전체</option><option value="1">1km</option><option value="3">3km</option>
      <option value="5">5km</option><option value="10">10km</option><option value="20">20km</option>
    </select>
    <select id="regionF" onchange="render()"><option value="">지역 전체</option></select>
  </div>
  <div class="cat-scroll"><div class="cat-tabs" id="catTabs"></div></div>
  <div class="row">
    <div class="sort-tabs">
      <button class="sort-btn on" id="sRating" onclick="setSort('rating')">평점순</button>
      <button class="sort-btn" id="sDist" onclick="setSort('dist')">거리순</button>
      <button class="sort-btn" id="sReview" onclick="setSort('review')">리뷰순</button>
    </div>
  </div>
  <div class="loc-info" id="locInfo"></div>
</header>
<div class="banner" id="banner"></div>
<div id="list"></div>

let uLat=null,uLng=null,sort='rating',cat='전체';
const regions=[...new Set(PLACES.map(p=>{const m=p.a.match(/(서울|경기|인천|부산|대구|광주|대전|울산|강원|충북|충남|전북|전남|경북|경남|제주)/);return m?m[1]:'해외'}))].sort();
document.getElementById('regionF').innerHTML='<option value="">지역 전체</option>'+regions.map(r=>`<option value="${r}">${r}</option>`).join('');
const ct=document.getElementById('catTabs');
const usedCats=new Set(PLACES.map(p=>p.cat));
CATS.filter(c=>c==='전체'||usedCats.has(c)).forEach(c=>{
  const b=document.createElement('button');
  b.className='cat-btn'+(c==='전체'?' on':'');b.textContent=c;
  b.onclick=()=>{cat=c;document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('on'));b.classList.add('on');render();};
  ct.appendChild(b);
});
function dist(la,lo){if(!uLat)return null;const R=6371,dLat=(la-uLat)*Math.PI/180,dLon=(lo-uLng)*Math.PI/180;const a=Math.sin(dLat/2)**2+Math.cos(uLat*Math.PI/180)*Math.cos(la*Math.PI/180)*Math.sin(dLon/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function fmt(d){return d===null?'':d<1?`${Math.round(d*1000)}m`:`${d.toFixed(1)}km`;}
function rgn(a){const m=a.match(/(서울|경기|인천|부산|대구|광주|대전|울산|강원|충북|충남|전북|전남|경북|경남|제주)/);return m?m[1]:'해외';}
function toggleLoc(){
  if(uLat){uLat=null;uLng=null;document.getElementById('locBtn').textContent='📍 내 위치';document.getElementById('locBtn').classList.remove('active');document.getElementById('locInfo').textContent='';document.getElementById('distF').value='0';render();}
  else{document.getElementById('locBtn').textContent='📍 측위중...';navigator.geolocation.getCurrentPosition(p=>{uLat=p.coords.latitude;uLng=p.coords.longitude;document.getElementById('locBtn').textContent='📍 위치 ON';document.getElementById('locBtn').classList.add('active');document.getElementById('locInfo').textContent=`${uLat.toFixed(4)}, ${uLng.toFixed(4)}`;render();},()=>{document.getElementById('locBtn').textContent='📍 내 위치';banner('위치 권한 필요');});}
}
function setSort(m){sort=m;['Rating','Dist','Review'].forEach(s=>document.getElementById('s'+s).classList.toggle('on',m===s.toLowerCase()));render();}
function banner(msg){const b=document.getElementById('banner');b.textContent=msg;b.classList.add('show');setTimeout(()=>b.classList.remove('show'),3000);}
function render(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const md=parseInt(document.getElementById('distF').value);
  const rg=document.getElementById('regionF').value;
  let data=PLACES.map(p=>({...p,d:dist(p.la,p.lo)}));
  if(q)data=data.filter(p=>p.n.toLowerCase().includes(q)||p.a.toLowerCase().includes(q));
  if(cat!=='전체')data=data.filter(p=>p.cat===cat);
  if(rg)data=data.filter(p=>rgn(p.a)===rg);
  if(md>0){if(!uLat){banner('거리 필터는 위치 ON 후 사용');document.getElementById('distF').value='0';}else data=data.filter(p=>p.d!==null&&p.d<=md);}
  if(sort==='dist'&&uLat)data.sort((a,b)=>(a.d||999)-(b.d||999));
  else if(sort==='review')data.sort((a,b)=>parseInt((b.rv||'0').replace(/,/g,''))-parseInt((a.rv||'0').replace(/,/g,'')));
  else data.sort((a,b)=>parseFloat(b.r||0)-parseFloat(a.r||0));
  document.getElementById('countEl').textContent=`${data.length}개`;
  const list=document.getElementById('list');
  if(!data.length){list.innerHTML='<div class="empty">검색 결과 없음</div>';return;}
  list.innerHTML=data.map((p,i)=>{
    const url=`https://maps.google.com/maps/search/${encodeURIComponent(p.n)}/@${p.la},${p.lo},17z`;
    return `<a class="item" href="${url}" target="_blank"><div class="item-rank">${String(i+1).padStart(2,'0')}</div><div class="item-body"><div class="item-name">${p.n}</div><div class="item-meta"><span class="rating">★${p.r}</span><span class="reviews">${p.rv}개</span><span class="cat-tag">${p.cat}</span></div><div class="address">${p.a}</div></div>${p.d!==null?`<div class="dist">${fmt(p.d)}</div>`:''}</a>`;
  }).join('');
}
document.getElementById('search').addEventListener('input',render);
render();
</script>
