<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>내 맛집 리스트</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --border: #2e2c28;
    --accent: #e8b84b;
    --accent2: #c9643a;
    --text: #e8e4dc;
    --muted: #7a7568;
    --tag-bg: #252320;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
  }
  header {
    padding: 2rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
    backdrop-filter: blur(10px);
  }
  .header-top {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 1rem;
  }
  h1 {
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .count {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
  }
  .controls {
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  input[type="text"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.55rem 0.9rem;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.85rem;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .filter-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 0.7rem;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.8rem;
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }
  select:focus { border-color: var(--accent); }
  .btn-loc {
    background: var(--accent);
    color: #0f0e0c;
    border: none;
    padding: 0.5rem 0.9rem;
    font-family: 'Noto Serif KR', serif;
    font-size: 0.8rem;
    font-weight: 700;
    border-radius: 6px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }
  .btn-loc:hover { opacity: 0.85; }
  .btn-loc.active { background: var(--accent2); }
  .loc-info {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    padding: 0.3rem 0;
  }
  .list {
    padding: 0.5rem 0;
  }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    text-decoration: none;
    color: inherit;
  }
  .item:hover { background: var(--surface); }
  .item-rank {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    min-width: 24px;
    padding-top: 3px;
  }
  .item-body { flex: 1; min-width: 0; }
  .item-name {
    font-size: 0.95rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
    line-height: 1.3;
  }
  .item-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.25rem;
  }
  .rating {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--accent);
    font-weight: 500;
  }
  .reviews {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
  }
  .category {
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--tag-bg);
    padding: 0.15rem 0.5rem;
    border-radius: 3px;
  }
  .address {
    font-size: 0.72rem;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 100%;
  }
  .dist {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent2);
    font-weight: 500;
    white-space: nowrap;
    padding-top: 3px;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 4rem 1rem;
    font-size: 0.9rem;
  }
  .sort-tabs {
    display: flex;
    gap: 0.4rem;
  }
  .sort-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 0.7rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sort-btn.on {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,184,75,0.07);
  }
  .status-banner {
    background: rgba(232,184,75,0.08);
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 1.5rem;
    font-size: 0.75rem;
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    display: none;
  }
  .status-banner.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>내 맛집</h1>
    <span class="count" id="countEl">— 개</span>
  </div>
  <div class="controls">
    <div class="search-wrap">
      <input type="text" id="search" placeholder="식당 이름 검색...">
    </div>
    <button class="btn-loc" id="locBtn" onclick="toggleLocation()">📍 내 위치</button>
  </div>
  <div style="margin-top:0.5rem" class="filter-row">
    <select id="distFilter" onchange="render()">
      <option value="0">거리 전체</option>
      <option value="1">1km 이내</option>
      <option value="3">3km 이내</option>
      <option value="5">5km 이내</option>
      <option value="10">10km 이내</option>
      <option value="20">20km 이내</option>
    </select>
    <select id="regionFilter" onchange="render()">
      <option value="">지역 전체</option>
    </select>
    <div class="sort-tabs">
      <button class="sort-btn on" id="sRating" onclick="setSort('rating')">평점순</button>
      <button class="sort-btn" id="sDist" onclick="setSort('dist')">거리순</button>
      <button class="sort-btn" id="sReview" onclick="setSort('review')">리뷰순</button>
    </div>
  </div>
  <div class="loc-info" id="locInfo"></div>
</header>

<div class="status-banner" id="statusBanner"></div>

<div class="list" id="list"></div>

let userLat = null, userLng = null;
let sortMode = 'rating';

function dist(la, lo) {
  if (!userLat) return null;
  const R = 6371;
  const dLat = (la - userLat) * Math.PI / 180;
  const dLon = (lo - userLng) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(userLat*Math.PI/180)*Math.cos(la*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function fmtDist(d) {
  if (d === null) return '';
  return d < 1 ? `${Math.round(d*1000)}m` : `${d.toFixed(1)}km`;
}

function getRegion(addr) {
  const m = addr.match(/(서울|경기|인천|부산|대구|광주|대전|울산|세종|강원|충북|충남|전북|전남|경북|경남|제주)/);
  return m ? m[1] : '해외';
}

function toggleLocation() {
  if (userLat) {
    userLat = null; userLng = null;
    document.getElementById('locBtn').classList.remove('active');
    document.getElementById('locInfo').textContent = '';
    document.getElementById('distFilter').value = '0';
    render();
  } else {
    document.getElementById('locBtn').textContent = '📍 측위중...';
    navigator.geolocation.getCurrentPosition(pos => {
      userLat = pos.coords.latitude;
      userLng = pos.coords.longitude;
      document.getElementById('locBtn').textContent = '📍 위치 ON';
      document.getElementById('locBtn').classList.add('active');
      document.getElementById('locInfo').textContent = `현재 위치 ${userLat.toFixed(4)}, ${userLng.toFixed(4)}`;
      render();
    }, () => {
      document.getElementById('locBtn').textContent = '📍 내 위치';
      showBanner('위치 권한이 필요합니다.');
    });
  }
}

function setSort(mode) {
  sortMode = mode;
  ['Rating','Dist','Review'].forEach(s => {
    document.getElementById('s'+s).classList.toggle('on', mode === s.toLowerCase());
  });
  render();
}

function showBanner(msg) {
  const b = document.getElementById('statusBanner');
  b.textContent = msg;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 3000);
}

// Build region options
const regions = [...new Set(PLACES.map(p => getRegion(p.a)))].sort();
const sel = document.getElementById('regionFilter');
regions.forEach(r => {
  const o = document.createElement('option');
  o.value = r; o.textContent = r;
  sel.appendChild(o);
});

function render() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const maxDist = parseInt(document.getElementById('distFilter').value);
  const region = document.getElementById('regionFilter').value;

  let data = PLACES.map(p => ({ ...p, d: dist(p.la, p.lo) }));

  if (q) data = data.filter(p => p.n.toLowerCase().includes(q) || p.a.toLowerCase().includes(q));
  if (region) data = data.filter(p => getRegion(p.a) === region);
  if (maxDist > 0) {
    if (!userLat) { showBanner('거리 필터는 위치 ON 후 사용하세요'); document.getElementById('distFilter').value = '0'; }
    else data = data.filter(p => p.d !== null && p.d <= maxDist);
  }

  if (sortMode === 'dist' && userLat) data.sort((a,b) => (a.d||999)-(b.d||999));
  else if (sortMode === 'review') data.sort((a,b) => parseInt((b.rv||'0').replace(/,/g,'')) - parseInt((a.rv||'0').replace(/,/g,'')));
  else data.sort((a,b) => parseFloat(b.r||0) - parseFloat(a.r||0));

  document.getElementById('countEl').textContent = `${data.length}개`;

  const list = document.getElementById('list');
  if (!data.length) { list.innerHTML = '<div class="empty">검색 결과가 없어요</div>'; return; }

  list.innerHTML = data.map((p, i) => {
    const mapUrl = `https://maps.google.com/maps/search/${encodeURIComponent(p.n)}/@${p.la},${p.lo},17z`;
    const distStr = p.d !== null ? fmtDist(p.d) : '';
    const cat = p.c && !p.c.startsWith('₩') && !p.c.startsWith('€') ? p.c : '';
    return `<a class="item" href="${mapUrl}" target="_blank">
      <div class="item-rank">${String(i+1).padStart(2,'0')}</div>
      <div class="item-body">
        <div class="item-name">${p.n}</div>
        <div class="item-meta">
          <span class="rating">★${p.r}</span>
          <span class="reviews">${p.rv}개 리뷰</span>
          ${cat ? `<span class="category">${cat}</span>` : ''}
        </div>
        <div class="address">${p.a}</div>
      </div>
      ${distStr ? `<div class="dist">${distStr}</div>` : ''}
    </a>`;
  }).join('');
}

document.getElementById('search').addEventListener('input', render);
render();
</script>
</body>
</html>
